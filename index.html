<!DOCTYPE html> 
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MuscleStationTH</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HERO SLIDER -->
<div class="hero-slider">

  <div class="hero-wrapper" id="heroSlider">

    <div class="hero-slide">
      <img src="images/epiban.png" loading="eager">
    </div>

    <div class="hero-slide">
      <img src="images/5aminoban.png" loading="lazy">
    </div>

    <div class="hero-slide">
      <img src="images/nadban.png" loading="lazy">
    </div>

    <div class="hero-slide">
      <img src="images/ss31ban.png" loading="lazy">
    </div>

    <div class="hero-slide">
      <img src="images/aodban.png" loading="lazy">
    </div>

    <div class="hero-slide">
      <img src="images/cjcban.png" loading="lazy">
    </div>

    <div class="hero-slide">
      <img src="images/fragban.png" loading="lazy">
    </div>

    <div class="hero-slide">
      <img src="images/glutaban.png" loading="lazy">
    </div>

    <div class="hero-slide">
      <img src="images/klowban.png" loading="lazy">
    </div>

    <div class="hero-slide">
      <img src="images/motsban.png" loading="lazy">
    </div>

    <div class="hero-slide">
      <img src="images/pt141ban.png" loading="lazy">
    </div>

    <div class="hero-slide">
      <img src="images/tesaban.png" loading="lazy">
    </div>



    <div class="hero-slide">
      <img src="images/tirzeppensaban1.png" loading="lazy">
    </div>

    <div class="hero-slide">
      <img src="images/tirzeppensaban2.png" loading="lazy">
    </div>

    <div class="hero-slide">
      <img src="images/tirzeppensaban3.png" loading="lazy">
    </div>
    

  </div>

  <!-- ปุ่มลูกศร -->
  <button class="hero-arrow left" onclick="prevHero()">❮</button>
  <button class="hero-arrow right" onclick="nextHero()">❯</button>

</div>



  
 <!-- <header>รายการสินค้า</header> -->
  <div class="tabs">

    <!-- ปุ่ม tab -->
    <button onclick="showTab(1)" class="tab-btn" data-tab="1">🛍 สินค้า</button>
    <button onclick="showTab(3)" class="tab-btn" data-tab="3">สินค้าเข้าใหม่ โปรโมชั่น</button>
    <button onclick="showTab(2)" class="tab-btn" data-tab="2">🛒 ตะกร้า</button>
  </div>




  <!-- Tab 1: สินค้า -->
  <div id="tab1" class="tab-content">



    <!-- 🔍 ช่องค้นหา -->
    <div class="search-bar-container">
      <input type="text" id="searchInput" placeholder="🔍 ค้นหาสินค้า..." onkeyup="filterProducts()">
      <button id="clearSearchBtn" onclick="clearSearch()">Clear</button>
    </div>

    <!-- ผลการค้นหา -->
    <div id="searchResults" class="product-grid" style="display:none;"></div>




    <!-- สินค้า -->
    <div id="categoryList" class="category-grid"></div>
    <div id="subCategoryList" class="subcategory-list"></div>
    <div id="productList" class="product-grid"></div>


    <!-- Cart Bar -->
    <div id="cartBar" class="cart-bar">
      <div class="cart-left">
        <span id="totalItems1">รวม 0 ชิ้น</span>
        <span id="totalPrice1">0 บาท</span>
      </div>
      <button id="goToCartBtn" class="cart-icon-btn" onclick="showTab(2)">🛒</button>
    </div>

  </div>

  <!-- Tab 3: Update -->
  <div id="tab3" class="tab-content" style="display:none">
    <!-- สินค้าเข้าใหม่ -->
    <div id="newProductsSection">
      <h2>✨ สินค้าเข้าใหม่</h2>
      <div class="slider-container">
        <div class="slider-wrapper" id="newProductsSlider"></div>
      </div>
      <div class="slider-dots" id="newSliderDots"></div>
    </div>

    <!-- สินค้าโปรโมชั่น -->
    <div id="promoProductsSection" style="margin-top: 30px;">
      <h2>🔥 สินค้าโปรโมชั่น</h2>
      <div class="slider-container">
        <div class="slider-wrapper" id="promoProductsSlider"></div>
      </div>
      <div class="slider-dots" id="promoSliderDots"></div>
    </div>
    <!-- Tab 3 Cart Bar -->
    <div id="cartBar3" class="cart-bar">
      <div class="cart-left">
        <span id="totalItems3">รวม 0 ชิ้น</span>
        <span id="totalPrice3">0 บาท</span>
      </div>
      <button id="goToCartBtn3" class="cart-icon-btn" onclick="showTab(2)">🛒</button>
    </div>

    
  </div>



  <!-- Tab 2: ตะกร้าสินค้า -->
  <div id="tab2" class="tab-content" style="display:none;">
    <div id="cartList"></div>
    <div class="cart-summary">
      <p id="totalItems2">รวม 0 ชิ้น</p>
      <p id="totalPrice2">0 บาท</p>
      <button onclick="checkout()" class="checkout-btn">สั่งซื้อเลย</button>
    </div>

    <!-- ที่อยู่ลูกค้า -->
    <div class="customer-info">
      <h3>ชื่อ-ที่อยู่จัดส่ง</h3>
      <p style="font-size:14px;color:#666;">
        (กรอกเพียงครั้งเดียว ระบบจะบันทึกไว้สำหรับการสั่งซื้อครั้งต่อๆไป)
      </p>

  
      <textarea id="custAddress" placeholder="ชื่อ-ที่อยู่-เบอร์โทร" 
                style="width:100%; max-width:100%; min-height:120px; resize: vertical; box-sizing:border-box; font-size:18px;"></textarea>

      <div style="margin-top:10px;">
        <button onclick="saveCustomerInfo()" id="saveBtn" class="checkout-btn">บันทึกที่อยู่</button>
        <button onclick="editCustomerInfo()" id="editBtn" class="checkout-btn" style="display:none;background:#f39c12;">แก้ไขข้อมูล</button>
      </div>
    </div>
  </div>




  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="script.js"></script>
</body>
</html>
